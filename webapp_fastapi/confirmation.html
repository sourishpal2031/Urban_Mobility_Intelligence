<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        body {
            background-color: #11151c;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 70px;
        }

        .container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            width: 700px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.4rem;
            color: #c9d1d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ main_heading }}</h1>
        <p>{{ sub_heading }}</p>
    </div>
</body>
</html>
